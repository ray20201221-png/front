<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI 聊天機器人</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

.container {
    max-width: 600px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.header {
    background: #4f46e5;
    color: white;
    padding: 15px;
    text-align: center;
}

.chat-box {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
}

.me {
    background: #4f46e5;
    color: white;
    align-self: flex-end;
}

.bot {
    background: #e5e7eb;
    align-self: flex-start;
}

.input-box {
    display: flex;
    padding: 10px;
    background: white;
}

input {
    flex: 1;
    padding: 10px;
}

button {
    margin-left: 8px;
    padding: 10px;
    background: #4f46e5;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">🤖 Ollama AI 聊天</div>

    <div id="chat" class="chat-box"></div>

    <div class="input-box">
        <input id="msg" placeholder="輸入訊息...">
        <button onclick="send()">送出</button>
    </div>

</div>

<script>
async function send() {
    let msg = document.getElementById("msg").value;
    if (!msg) return;

    addMsg(msg, "me");

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    });

    let data = await res.json();

    addMsg(data.reply, "bot");

    document.getElementById("msg").value = "";
}

function addMsg(text, type) {
    let div = document.createElement("div");
    div.classList.add("msg", type);
    div.innerText = text;

    document.getElementById("chat").appendChild(div);

    document.getElementById("chat").scrollTop =
        document.getElementById("chat").scrollHeight;
}
</script>

</body>
</html>
