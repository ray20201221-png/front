<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | RUI AI</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-title-key="admin">
<script>
if(!localStorage.getItem("token") || localStorage.getItem("is_admin") !== "1"){
    location.href = "login.html";
}
</script>

<div class="admin-app shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">R</div>
            <div>
                <h1>Admin</h1>
                <p data-i18n="consoleSubtitle">RUI AI 控制台</p>
            </div>
        </div>

        <div class="language-switch" aria-label="Language">
            <button data-lang="zh" onclick="setLanguage('zh')">中文</button>
            <button data-lang="en" onclick="setLanguage('en')">EN</button>
        </div>

        <button class="nav-button" onclick="location.href='index.html'" data-i18n-title="chat" title="聊天">
            <i data-lucide="message-square"></i>
            <span data-i18n="chat">聊天</span>
        </button>
        <button class="nav-button" onclick="logout()" data-i18n-title="logout" title="登出">
            <i data-lucide="log-out"></i>
            <span data-i18n="logout">登出</span>
        </button>

        <div class="sidebar-section">
            <h2 data-i18n="users">使用者</h2>
            <div id="userList" class="admin-list"></div>
        </div>
    </aside>

    <main class="admin-main">
        <section class="admin-section">
            <div class="admin-section-title">
                <div>
                    <span class="eyebrow" data-i18n="conversationAudit">對話稽核</span>
                    <h2 data-i18n="userMessages">使用者聊天紀錄</h2>
                </div>
                <span id="selectedUser" class="pill"></span>
            </div>
            <div id="messageList" class="admin-messages"></div>
        </section>

        <section class="admin-section">
            <div class="admin-section-title">
                <div>
                    <span class="eyebrow" data-i18n="backend">後端</span>
                    <h2 data-i18n="sourceViewer">程式碼檢視</h2>
                </div>
                <select id="codeFile" onchange="loadCodeFile()"></select>
            </div>
            <pre id="codeViewer" class="code-viewer"></pre>
        </section>

        <section class="admin-section admin-rag-section">
            <div class="admin-section-title">
                <div>
                    <span class="eyebrow" data-i18n="retrieval">檢索</span>
                    <h2 data-i18n="ragKnowledge">RAG 知識庫</h2>
                </div>
                <button class="small-button" onclick="rebuildRag()" data-i18n-title="reindex" title="重建索引">
                    <i data-lucide="refresh-cw"></i>
                    <span data-i18n="reindex">重建索引</span>
                </button>
            </div>
            <div id="ragStatus" class="rag-status"></div>
        </section>
    </main>
</div>

<script src="i18n.js"></script>
<script src="admin.js"></script>
<script>if(window.lucide){ lucide.createIcons(); }</script>
</body>
</html>
