<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUI AI</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-title-key="askTitle">
<script>
if(!localStorage.getItem("token")){
    location.href = "login.html";
}
</script>

<div class="app shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">R</div>
            <div>
                <h1>RUI AI</h1>
                <p data-i18n="appSubtitle">Research assistant</p>
            </div>
        </div>

        <div class="language-switch" aria-label="Language">
            <button data-lang="zh" onclick="setLanguage('zh')">中文</button>
            <button data-lang="en" onclick="setLanguage('en')">EN</button>
        </div>

        <button class="nav-button primary" onclick="newChat()" data-i18n-title="newChat" title="New chat">
            <i data-lucide="plus"></i>
            <span data-i18n="newChat">New chat</span>
        </button>
        <button id="adminButton" class="nav-button" onclick="openAdmin()" style="display:none" data-i18n-title="admin" title="Admin">
            <i data-lucide="shield"></i>
            <span data-i18n="admin">Admin</span>
        </button>
        <button class="nav-button" onclick="logout()" data-i18n-title="logout" title="Logout">
            <i data-lucide="log-out"></i>
            <span data-i18n="logout">Logout</span>
        </button>

        <div class="sidebar-section">
            <h2 data-i18n="chatHistory">Chat history</h2>
            <div id="conversationList" class="conversation-list"></div>
        </div>

        <div class="sidebar-note">
            <span data-i18n="ragLabel">RAG</span>
            <p data-i18n="ragNote">HyDE retrieval and reranking are enabled when knowledge files are available.</p>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div>
                <span class="eyebrow" data-i18n="chatWorkspace">Chat workspace</span>
                <h2 data-i18n="askTitle">Ask RUI AI</h2>
            </div>
            <div id="userBadge" class="user-badge"></div>
        </header>

        <div id="chat" class="chat-box">
            <section id="welcome" class="welcome-panel">
                <div class="assistant-mark">AI</div>
                <h2 data-i18n="welcomeTitle">What can we work through today?</h2>
                <p data-i18n="welcomeText">Ask a question, explore your documents, or test the RAG pipeline.</p>
                <div class="prompt-row">
                    <button onclick="usePrompt(t('promptKnowledgeText'))" data-i18n="promptKnowledge">Summarize knowledge</button>
                    <button onclick="usePrompt(t('promptRagText'))" data-i18n="promptRag">Explain RAG</button>
                    <button onclick="usePrompt(t('promptDeployText'))" data-i18n="promptDeploy">Debug deployment</button>
                </div>
            </section>
        </div>

        <form class="composer" onsubmit="event.preventDefault(); send();">
            <input
                id="msg"
                placeholder="Message RUI AI..."
                data-i18n-placeholder="messagePlaceholder"
                autocomplete="off"
            >
            <button class="send-button" type="submit" data-i18n-title="send" title="Send">
                <i data-lucide="send-horizontal"></i>
                <span data-i18n="send">Send</span>
            </button>
        </form>
    </main>
</div>

<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
