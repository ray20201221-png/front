<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUI AI</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-title-key="askTitle">
<script>
if(!localStorage.getItem("token")){
    location.href = "login.html";
}
</script>

<div class="app shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">R</div>
            <div>
                <h1>RUI AI</h1>
                <p data-i18n="appSubtitle">研究助理</p>
            </div>
        </div>

        <div class="language-switch" aria-label="Language">
            <button data-lang="zh" onclick="setLanguage('zh')">中文</button>
            <button data-lang="en" onclick="setLanguage('en')">EN</button>
        </div>

        <button class="nav-button primary" onclick="newChat()" data-i18n-title="newChat" title="新聊天">
            <i data-lucide="plus"></i>
            <span data-i18n="newChat">新聊天</span>
        </button>
        <button id="adminButton" class="nav-button" onclick="openAdmin()" style="display:none" data-i18n-title="admin" title="管理後台">
            <i data-lucide="shield"></i>
            <span data-i18n="admin">管理後台</span>
        </button>
        <button class="nav-button" onclick="logout()" data-i18n-title="logout" title="登出">
            <i data-lucide="log-out"></i>
            <span data-i18n="logout">登出</span>
        </button>

        <div class="sidebar-note">
            <span data-i18n="ragLabel">RAG</span>
            <p data-i18n="ragNote">有知識庫文件時，系統會啟用 HyDE 檢索與重排序。</p>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div>
                <span class="eyebrow" data-i18n="chatWorkspace">聊天工作區</span>
                <h2 data-i18n="askTitle">詢問 RUI AI</h2>
            </div>
            <div id="userBadge" class="user-badge"></div>
        </header>

        <div id="chat" class="chat-box">
            <section id="welcome" class="welcome-panel">
                <div class="assistant-mark">AI</div>
                <h2 data-i18n="welcomeTitle">今天想一起處理什麼？</h2>
                <p data-i18n="welcomeText">你可以問問題、探索文件，或測試 RAG 流程。</p>
                <div class="prompt-row">
                    <button onclick="usePrompt('請幫我整理知識庫內容。')" data-i18n="promptKnowledge">整理知識庫</button>
                    <button onclick="usePrompt('請解釋這個專案的 RAG 系統如何運作。')" data-i18n="promptRag">解釋 RAG</button>
                    <button onclick="usePrompt('請協助我檢查聊天機器人的部署問題。')" data-i18n="promptDeploy">協助部署除錯</button>
                </div>
            </section>
        </div>

        <form class="composer" onsubmit="event.preventDefault(); send();">
            <input
                id="msg"
                placeholder="傳訊息給 RUI AI..."
                data-i18n-placeholder="messagePlaceholder"
                autocomplete="off"
            >
            <button class="send-button" type="submit" data-i18n-title="send" title="送出">
                <i data-lucide="send-horizontal"></i>
                <span data-i18n="send">送出</span>
            </button>
        </form>
    </main>
</div>

<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
