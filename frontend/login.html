<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | RUI AI</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-body" data-title-key="loginTitle">
<main class="auth-shell">
    <section class="auth-panel">
        <div class="language-switch auth-language" aria-label="Language">
            <button data-lang="zh" onclick="setLanguage('zh')">中文</button>
            <button data-lang="en" onclick="setLanguage('en')">EN</button>
        </div>

        <div class="brand auth-brand">
            <div class="brand-mark">R</div>
            <div>
                <h1>RUI AI</h1>
                <p data-i18n="appSubtitle">研究助理</p>
            </div>
        </div>

        <div class="auth-copy">
            <span class="eyebrow" data-i18n="welcomeBack">歡迎回來</span>
            <h2 data-i18n="loginHeading">登入後繼續使用</h2>
        </div>

        <div class="field">
            <i data-lucide="user"></i>
            <input id="username" placeholder="帳號" data-i18n-placeholder="username">
        </div>
        <div class="field">
            <i data-lucide="lock-keyhole"></i>
            <input id="password" type="password" placeholder="密碼" data-i18n-placeholder="password">
        </div>

        <button class="auth-submit" onclick="login()">
            <span data-i18n="login">登入</span>
            <i data-lucide="arrow-right"></i>
        </button>

        <p class="auth-link"><span data-i18n="noAccount">還沒有帳號？</span> <a href="register.html" data-i18n="createOne">建立帳號</a></p>
    </section>
</main>

<script src="i18n.js"></script>
<script src="auth.js"></script>
<script>if(window.lucide){ lucide.createIcons(); }</script>
</body>
</html>
